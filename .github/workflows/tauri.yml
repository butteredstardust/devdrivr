name: 'Build & Release Cockpit'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/cockpit/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump:
    name: 'Auto-increment Version'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Auto-increment version
        id: bump
        run: |
          node apps/cockpit/scripts/bump-version.mjs

      - name: Commit version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/cockpit/package.json apps/cockpit/src-tauri/tauri.conf.json
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  build:
    name: 'Build'
    needs: bump
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            args: --target aarch64-apple-darwin
            description: 'macOS Apple Silicon'
          - platform: macos-26-intel
            args: --target x86_64-apple-darwin
            description: 'macOS Intel'
          - platform: windows-latest
            args: ''
            description: 'Windows'
          - platform: ubuntu-24.04
            args: ''
            description: 'Linux'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Ensure we pick up the bump-version commit

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/cockpit/src-tauri -> target

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          tagName: cockpit-v__VERSION__
          releaseName: 'devdrivr Cockpit v__VERSION__'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: false
          prerelease: false
          projectPath: ./apps/cockpit/
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

  publish-update-manifest:
    name: 'Publish Update Manifest'
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/cockpit/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release assets and generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="cockpit-v${VERSION}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Fetch actual asset names from the release and verify expected files exist
          ASSETS=$(gh release view "${TAG}" --json assets --jq '[.assets[].name]')
          echo "Release assets: ${ASSETS}"

          EXPECTED_ASSETS=(
            "devdrivr_${VERSION}_aarch64.dmg"
            "devdrivr_${VERSION}_x64.dmg"
            "devdrivr_${VERSION}_amd64.AppImage"
            "devdrivr_${VERSION}_x64-setup.exe"
          )

          MISSING=0
          for ASSET in "${EXPECTED_ASSETS[@]}"; do
            if ! echo "${ASSETS}" | grep -q "\"${ASSET}\""; then
              echo "WARNING: Expected asset not found in release: ${ASSET}"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "${MISSING}" -gt 0 ]; then
            echo "ERROR: ${MISSING} expected asset(s) missing from release ${TAG}. Aborting manifest generation."
            exit 1
          fi

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE_URL}/devdrivr_${VERSION}_aarch64.dmg"
              },
              "darwin-x86_64": {
                "url": "${BASE_URL}/devdrivr_${VERSION}_x64.dmg"
              },
              "linux-x86_64": {
                "url": "${BASE_URL}/devdrivr_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/devdrivr_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="cockpit-v${VERSION}"
          gh release upload "${TAG}" latest.json --clobber

