name: 'Build & Release Cockpit'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/cockpit/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump:
    name: 'Auto-increment Version'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Auto-increment version
        id: bump
        run: |
          node apps/cockpit/scripts/bump-version.mjs

      - name: Commit version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/cockpit/package.json apps/cockpit/src-tauri/tauri.conf.json
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  build:
    name: 'Build'
    needs: bump
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            args: --target aarch64-apple-darwin
            description: 'macOS Apple Silicon'
          - platform: macos-26-intel
            args: --target x86_64-apple-darwin
            description: 'macOS Intel'
          - platform: windows-latest
            args: ''
            description: 'Windows'
          - platform: ubuntu-24.04
            args: ''
            description: 'Linux'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Ensure we pick up the bump-version commit

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/cockpit/src-tauri -> target


      - name: CI Setup and Diagnostics
        run: bash ./apps/cockpit/scripts/ci-setup.sh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate release manifest
        working-directory: ./apps/cockpit
        run: bun run scripts/generate-latest-json.ts

      - name: Upload latest.json as artifact
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: latest-json
          path: apps/cockpit/latest.json
          retention-days: 1

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          tagName: cockpit-v__VERSION__
          releaseName: 'devdrivr Cockpit v__VERSION__'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: false
          prerelease: false
          projectPath: ./apps/cockpit/
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

  upload-manifest:
    name: 'Upload manifest to release'
    needs: [build, bump]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download latest.json artifact
        uses: actions/download-artifact@v4
        with:
          name: latest-json
          path: .

      - name: Upload to release
        run: |
          VERSION=$(jq -r '.version' latest.json)
          gh release upload cockpit-v$VERSION latest.json --repo butteredstardust/devdrivr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
