<!doctype html>
<html lang="en" class="midnight">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>devdrivr</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Synchronous theme restore to prevent flash — runs before any CSS paint.
      // The settings store writes this cache on every theme change.
      try {
        var cached = localStorage.getItem('theme-cache');
        if (['midnight', 'warm-terminal', 'neon-brutalist', 'earth-code', 'cyber-luxe', 'soft-focus'].includes(cached)) {
          document.documentElement.className = cached;
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
